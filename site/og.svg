<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7db4ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#4f8fff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="subtleEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4f8fff" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b"/>

  <!-- Subtle glow behind wordmark -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Wordmark: μish -->
  <text x="600" y="290" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', 'Menlo', monospace" font-size="120" font-weight="700" letter-spacing="-4" fill="url(#textGrad)">μish</text>

  <!-- Tagline -->
  <text x="600" y="350" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', 'Menlo', monospace" font-size="22" font-weight="400" letter-spacing="4" fill="#55556a">the llm-native shell</text>

  <!-- URL hint -->
  <text x="600" y="540" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', 'Menlo', monospace" font-size="16" font-weight="400" letter-spacing="2" fill="#2a2a38">ohitsmish.com</text>
</svg>
