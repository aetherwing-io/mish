# Command -> category mapping fallback
# Used when a grammar doesn't declare its own category in front matter.
# Unknown commands not listed here default to "condense".

[categories]
# Narrate: silent file operations
cp = "narrate"
mv = "narrate"
mkdir = "narrate"
rm = "narrate"
chmod = "narrate"
chown = "narrate"
ln = "narrate"
touch = "narrate"

# Passthrough: output-centric commands
cat = "passthrough"
grep = "passthrough"
rg = "passthrough"
ls = "passthrough"
jq = "passthrough"
diff = "passthrough"
head = "passthrough"
tail = "passthrough"
less = "passthrough"
find = "passthrough"
wc = "passthrough"
sort = "passthrough"
uniq = "passthrough"
echo = "passthrough"
printf = "passthrough"
sed = "passthrough"
awk = "passthrough"
perl = "passthrough"
bat = "passthrough"
tee = "passthrough"
tr = "passthrough"
cut = "passthrough"
paste = "passthrough"
column = "passthrough"
nl = "passthrough"
pytest = "passthrough"
# System info / data commands
stat = "passthrough"
ps = "passthrough"
du = "passthrough"
df = "passthrough"
env = "passthrough"
printenv = "passthrough"
id = "passthrough"
who = "passthrough"
whoami = "passthrough"
uname = "passthrough"
uptime = "passthrough"
which = "passthrough"
file = "passthrough"
readlink = "passthrough"
realpath = "passthrough"
date = "passthrough"
hostname = "passthrough"
lsof = "passthrough"
md5sum = "passthrough"
shasum = "passthrough"
sha256sum = "passthrough"
strings = "passthrough"
od = "passthrough"
xxd = "passthrough"
hexdump = "passthrough"
xargs = "passthrough"
free = "passthrough"
dmesg = "passthrough"
mount = "passthrough"
lsblk = "passthrough"
ip = "passthrough"
ifconfig = "passthrough"
netstat = "passthrough"
dig = "passthrough"
nslookup = "passthrough"
ping = "passthrough"
traceroute = "passthrough"
sw_vers = "passthrough"
xattr = "passthrough"
otool = "passthrough"
nm = "passthrough"
ldd = "passthrough"

# Interactive: terminal-dependent commands
vim = "interactive"
nvim = "interactive"
nano = "interactive"
htop = "interactive"
top = "interactive"
psql = "interactive"
mysql = "interactive"
node = "interactive"   # REPL mode (no args)
python = "interactive" # REPL mode (no args)
ssh = "interactive"
