[tool]
name = "git"
detect = ["git"]
inherit = ["ansi-progress"]

# ---- log action ----

[actions.log]
detect = ["log"]
category = "passthrough"

[[actions.log.llm_hints]]
prefer = "--oneline -20"
reason = "default emits 6 lines/commit; --oneline = 1 line, 20 entries ~400 tokens"

# ---- status action ----

[actions.status]
detect = ["status"]

[[actions.status.llm_hints]]
prefer = "--short"
reason = "one char/file vs prose; stable across git versions"

# ---- diff action ----

[actions.diff]
detect = ["diff"]
category = "passthrough"

[[actions.diff.llm_hints]]
prefer = "--stat"
reason = "file-level summary before reading full diff; O(files) not O(lines)"

# ---- show action ----

[actions.show]
detect = ["show"]
category = "passthrough"

# ---- push action ----

[actions.push]
detect = ["push"]

[[actions.push.noise]]
pattern = '^(Enumerating|Counting|Compressing|Writing) objects'
action = "strip"

[[actions.push.noise]]
pattern = '^Delta compression'
action = "strip"

[[actions.push.noise]]
pattern = '^remote: (Enumerating|Counting|Compressing)'
action = "strip"

[[actions.push.outcome]]
pattern = '(?P<src>\S+)\s+->\s+(?P<dst>\S+)'
action = "promote"
captures = ["src", "dst"]

[[actions.push.hazard]]
pattern = '^\s*!\s+\[rejected\]'
severity = "error"
action = "keep"

[[actions.push.hazard]]
pattern = 'error: failed to push'
severity = "error"
action = "keep"

[actions.push.summary]
success = "+ pushed {src} -> {dst}"
failure = "! push rejected"
partial = "... pushing"

# ---- pull action ----

[actions.pull]
detect = ["pull", "fetch"]

[[actions.pull.noise]]
pattern = '^(Unpacking|remote:) '
action = "strip"

[[actions.pull.outcome]]
pattern = '(?P<count>\d+) files? changed'
action = "promote"
captures = ["count"]

[[actions.pull.outcome]]
pattern = 'Already up to date'
action = "promote"

[[actions.pull.hazard]]
pattern = 'CONFLICT'
severity = "error"
action = "keep"

[[actions.pull.hazard]]
pattern = 'error: Your local changes'
severity = "error"
action = "keep"

[actions.pull.summary]
success = "+ pulled ({count} files changed)"
failure = "! pull failed"
partial = "... pulling"

# ---- clone action ----

[actions.clone]
detect = ["clone"]

[[actions.clone.noise]]
pattern = '^(Cloning into|Receiving|Resolving)'
action = "strip"

[[actions.clone.outcome]]
pattern = "^Cloning into .(?P<dir>[^.]+)."
action = "promote"
captures = ["dir"]

[actions.clone.summary]
success = "+ cloned into {dir}"
failure = "! clone failed"
partial = "... cloning"
