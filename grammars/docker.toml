[tool]
name = "docker"
detect = ["docker"]
inherit = ["ansi-progress"]

# ---- build action ----

[actions.build]
detect = ["build", "buildx"]

[[actions.build.noise]]
pattern = '^\s*#\d+\s+(CACHED|DONE)'
action = "dedup"

[[actions.build.noise]]
pattern = '^\s*#\d+\s+\d+\.\d+\s'
action = "strip"

[[actions.build.outcome]]
pattern = 'exporting to image'
action = "promote"

[[actions.build.outcome]]
pattern = 'writing image sha256:(?P<hash>[0-9a-f]{12})'
action = "promote"
captures = ["hash"]

[[actions.build.hazard]]
pattern = '^(ERROR|error)\s'
severity = "error"
action = "keep"
multiline = 3

[[actions.build.hazard]]
pattern = 'DEPRECATED'
severity = "warning"
action = "keep"

[actions.build.summary]
success = "+ built image {hash}"
failure = "! docker build failed"
partial = "... building ({lines} lines)"

# ---- compose up ----

[actions.up]
detect = ["compose up", "up"]

[[actions.up.noise]]
pattern = '^\s*(Creating|Pulling|Starting)\s+'
action = "dedup"

[[actions.up.outcome]]
pattern = '(?P<name>\S+)\s+(Started|Running)'
action = "promote"
captures = ["name"]

[[actions.up.hazard]]
pattern = '(error|Error|exited with code [^0])'
severity = "error"
action = "keep"

[actions.up.summary]
success = "+ {name} started"
failure = "! compose up failed"
partial = "... starting containers"

# ---- block compression (BuildKit error blocks) ----

# BuildKit delimited error blocks: "------\n > [step] RUN cmd:\n...\n------"
[[block]]
start   = '^-{4,}$'
end     = '^-{4,}$'
extract = '>\s+\[(?P<stage>[^\]]+)\]\s+RUN\s+(?P<cmd>[^:]+):\n.*?(?:ERR!|[Ee]rror|ERROR)[:\s]\s*(?P<message>[^\n]+)'
digest  = "error[{stage}]: {cmd} — {message}"

# Step failure: "ERROR failed to solve: process ... exit code: N"
[[block]]
start   = '^ERROR\s+'
end     = '^\s*$'
extract = 'ERROR\s+(?P<message>failed to solve).*?exit code:\s*(?P<code>\d+)'
digest  = "error: {message} (exit {code})"

# ---- quiet config ----

[quiet]
safe_inject = ["--progress=plain"]
recommend = ["-q"]
